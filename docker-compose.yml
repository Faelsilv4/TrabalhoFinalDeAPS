

services:
  mysql-db:
    image: mysql:8.0
    container_name: biblioteca-aps-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: fael
      MYSQL_DATABASE: biblioteca_aps
    ports:
      - "3310:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pfael"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: biblioteca-aps-app
    restart: unless-stopped
    command: sh -c "sleep 25 && java -jar app.jar"
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/biblioteca_aps?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=30000
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: fael
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: true
    depends_on:
      - mysql-db
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge