    spring.application.name=trabalho_final_APS_2

    # 🚨 1. CONFIGURAÇÃO DE CONEXÃO MYSQL
    spring.datasource.url=jdbc:mysql://mysql-db:3306/biblioteca_aps?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    spring.datasource.username=root
    spring.datasource.password=fael


    # 🚨 2. CONFIGURAÇÃO JPA E HIBERNATE
    # 'create-drop' é bom para testar o 'import.sql'
    spring.jpa.hibernate.ddl-auto=update    

    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.format_sql=true

    # 🚨 CORREÇÃO ESSENCIAL: DIALETO PARA MYSQL
   spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


    # Configuração do Swagger para a URL da documentação
    springdoc.swagger-ui.path=/swagger-ui.html

    # JWT
    jwt.secret=change-this-secret-in-prod-please-123456789012345678901234567890
    # Tempo de expiração do token em milissegundos (24 horas)
    jwt.expiration=86400000

    # Removido: spring.h2.console.enabled=true
    # Removido: spring.h2.console.path=/h2-console
    # Removido: spring.security.headers.frame=false